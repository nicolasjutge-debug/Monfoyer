<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mon foyer</title>
<style>
  :root{--blue:#1c1cf2; --blue-dark:#1414c4; --ink:#0c0c2e; --grey:#6b6f8a; --bg:#eef0ff; --red:#d84343;}
  body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--ink);padding:20px;}
  .card{background:white;border-radius:18px;padding:20px;box-shadow:0 8px 24px rgba(20,20,90,0.08);margin-bottom:20px;}
  .field{margin-bottom:15px;}
  label{display:block;font-size:.7rem;text-transform:uppercase;color:var(--grey);margin-bottom:5px;}
  input{width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;}
  button{width:100%;padding:12px;border-radius:12px;border:none;background:var(--blue);color:white;font-weight:bold;margin-bottom:10px;cursor:pointer;}
  .secondary{background:#eef0ff;color:var(--blue);}
</style>
</head>
<body>
<div class="card">
  <h2>Synchronisation JSONBin</h2>
  <div class="field"><label>Clé API</label><input type="text" id="jb_key" placeholder="Entrez votre clé API"></div>
  <div class="field"><label>Bin ID</label><input type="text" id="jb_bin" placeholder="Entrez votre Bin ID"></div>
  <button onclick="jbSave()">Sauvegarder vers JSONBin</button>
  <button class="secondary" onclick="jbLoad()">Charger depuis JSONBin</button>
  <div id="jb_status" style="font-size:0.8rem; margin-top:10px; color:var(--grey);"></div>
</div>

<script>
// Sauvegarde locale corrigée
function saveToLocal(key, data) {
    try {
        localStorage.setItem(key, JSON.stringify(data));
        return true;
    } catch(e) { return false; }
}

function getFromLocal(key) {
    try {
        return JSON.parse(localStorage.getItem(key));
    } catch(e) { return null; }
}

async function jbSave() {
  const key = document.getElementById('jb_key').value.trim();
  const binId = document.getElementById('jb_bin').value.trim();
  const status = document.getElementById('jb_status');
  if (!key) { alert('Clé API manquante'); return; }
  
  status.textContent = "Sauvegarde en cours...";
  const url = 'https://api.jsonbin.io/v3/b' + (binId ? '/' + binId : '');
  
  try {
      const response = await fetch(url, {
        method: binId ? 'PUT' : 'POST',
        headers: {'Content-Type':'application/json', 'X-Master-Key':key},
        body: JSON.stringify({data: "Exemple de données sauvegardées"})
      });
      const d = await response.json();
      status.textContent = "Succès ! ID: " + (d.metadata ? d.metadata.id : binId);
      if(!binId && d.metadata) document.getElementById('jb_bin').value = d.metadata.id;
      localStorage.setItem('jb_key', key);
      localStorage.setItem('jb_bin', document.getElementById('jb_bin').value);
  } catch(e) { status.textContent = "Erreur : " + e; }
}

async function jbLoad() {
  const key = document.getElementById('jb_key').value.trim();
  const binId = document.getElementById('jb_bin').value.trim();
  if (!key || !binId) { alert('Clé et ID requis'); return; }
  
  try {
    const response = await fetch('https://api.jsonbin.io/v3/b/' + binId, {
      headers: {'X-Master-Key':key}
    });
    const d = await response.json();
    document.getElementById('jb_status').textContent = "Chargé : " + JSON.stringify(d.record);
  } catch(e) { document.getElementById('jb_status').textContent = "Erreur : " + e; }
}
</script>
</body>
</html>
